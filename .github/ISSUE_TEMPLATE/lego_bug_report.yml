name: 🐞 Bug Report (lego)
description: Create a report to help us improve.
labels: [bug]
body:
  - type: checkboxes
    id: terms
    attributes:
      label: Welcome
      options:
        - label: Yes, I'm using a binary release or the library within the two latest releases.
          required: true
        - label: Yes, I've searched for similar issues on GitHub and didn't find any.
          required: true

  - type: dropdown
    id: type
    attributes:
      label: How do you use lego?
      default: 0
      options:
        - n/a
        - Library
        - Binary
        - Docker image
        - go install
        - Through 1Panel
        - Through Bitnami
        - Through Caddy
        - Through Certimate
        - Through Dokku plugin
        - Through Home Assistant plugin
        - Through Terraform ACME provider
        - Through Traefik
        - Through Zoraxy
        - Other (please explain)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Effective version of lego
      description: "`latest` or `dev` are NOT effective versions."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      value: |-
        <details>

        ```console
        # paste output here
        ```

        </details>
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to see?
      placeholder: Description.
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: What did you see instead?
      placeholder: Description.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: "How do you trigger this bug? Please walk us through it step by step."
      placeholder: |
        1. ...
        2. ...
        3. ...
        ...
    validations:
      required: true

  - type: textarea
    id: go-env
    attributes:
      label: Go environment (if applicable)
      value: |-
        <details>

        ```console
        $ go version && go env
        # paste output here
        ```

        </details>
    validations:
      required: false

  - type: dropdown
    id: usage
    attributes:
      label: In which context are you using lego?
      options:
        - I don't know
        - Personal use
        - Professional use
        - Personal and professional use
        - Other (please explain)
    validations:
      required: true

  - type: checkboxes
    id: validation
    attributes:
      label: Validation
      options:
        - label: Yes, I've included all the information above (version, usage, etc.).
          required: true

  - type: checkboxes
    id: value-affirmation
    attributes:
      label: 🌱 Supporting the Maintainer
      options:
        - label: "I find this project useful, and it has saved me time in my workflow/business."
          required: true
        - label: "I have starred this repository to help other developers find it."
          required: false

  - type: markdown
    attributes:
      value: |
        To keep the project stable and ensure I can continue responding to issues quickly, please consider **[sponsoring my work](https://donate.ldez.dev)**.
        
        Your support ensures this tool remains a reliable part of your toolkit for years to come.

        [Support Project Longevity →](https://donate.ldez.dev)
